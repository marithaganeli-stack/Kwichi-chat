<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kwichi Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Segoe UI", Arial;
  background:#d1d7db;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat-container {
  width:100%;
  max-width:400px;
  height:100vh;
  background:#efeae2;
  display:flex;
  flex-direction:column;
}

.header {
  background:#075e54;
  color:white;
  padding:15px;
  font-size:18px;
}

.chat-box {
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  max-width:80%;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
}

.sent {
  align-self:flex-end;
  background:#dcf8c6;
}

.received {
  align-self:flex-start;
  background:white;
}

.reply-box {
  font-size:12px;
  border-left:3px solid #128C7E;
  padding-left:5px;
  margin-bottom:5px;
  opacity:0.8;
}

img, video {
  max-width:100%;
  border-radius:8px;
  margin-top:5px;
}

.input-area {
  background:#f0f0f0;
  padding:10px;
  position:relative;
  z-index:10;
}

.reply-preview {
  display:none;
  background:#e2e8f0;
  padding:5px;
  font-size:12px;
  justify-content:space-between;
}

.input-row {
  display:flex;
  gap:8px;
  align-items:center;
}

.file-btn {
  font-size:22px;
  cursor:pointer;
}

textarea {
  flex:1;
  border-radius:20px;
  border:none;
  padding:10px;
  resize:none;
  outline:none;
}

.send-btn {
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:#128C7E;
  color:white;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">Kwichi Chat</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">

<div class="reply-preview" id="replyPreview">
<span id="replyText"></span>
<button onclick="cancelReply()">✖</button>
</div>

<div class="input-row">
<label class="file-btn">
📎
<input type="file" id="fileInput" hidden>
</label>

<textarea id="messageInput" placeholder="Andika ujumbe..."></textarea>

<button class="send-btn" onclick="sendMessage()">➤</button>
</div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCQEOs_sn8J2EP1SRPXuBhLsK_3NJVmD0-a",
  authDomain: "kwichi-chat.firebaseapp.com",
  projectId: "kwichi-chat",
  storageBucket: "kwichi-chat.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const storage = firebase.storage();

let currentUser;
let replyTo = null;
const chatId = "main-chat";

auth.signInAnonymously().then(res => {
  currentUser = res.user;
  loadMessages();
});

function loadMessages() {
  db.collection("chats").doc(chatId).collection("messages")
  .orderBy("timestamp")
  .onSnapshot(snapshot => {

    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      if (!data.timestamp) return;

      const div = document.createElement("div");
      div.className = "message " + (data.uid === currentUser.uid ? "sent" : "received");

      let html = "";

      if (data.replyTo) {
        html += `<div class="reply-box">${data.replyTo.text}</div>`;
      }

      html += data.text || "";

      if (data.imageUrl) html += `<img src="${data.imageUrl}">`;
      if (data.videoUrl) html += `<video src="${data.videoUrl}" controls></video>`;

      div.innerHTML = html;

      div.onclick = () => {
        replyTo = { text: data.text };
        document.getElementById("replyPreview").style.display = "flex";
        document.getElementById("replyText").innerText = data.text;
      };

      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function cancelReply() {
  replyTo = null;
  document.getElementById("replyPreview").style.display = "none";
}

async function sendMessage() {
  const text = document.getElementById("messageInput").value.trim();
  const file = document.getElementById("fileInput").files[0];

  if (!text && !file) return;

  let imageUrl = null;
  let videoUrl = null;

  // MODERN FILE HANDLING
  if (file) {
    const ref = storage.ref("media/" + Date.now() + "_" + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();

    if (file.type.startsWith("image/")) {
      imageUrl = url;
    } else if (file.type.startsWith("video/")) {
      videoUrl = url;
    }
  }

  await db.collection("chats").doc(chatId).collection("messages").add({
    text,
    uid: currentUser.uid,
    imageUrl,
    videoUrl,
    replyTo,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("messageInput").value = "";
  document.getElementById("fileInput").value = "";
  cancelReply();
}

// ENTER KEY
document.getElementById("messageInput").addEventListener("keypress", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// AUTO RESIZE
const textarea = document.getElementById("messageInput");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
});
</script>

</body>
</html>
